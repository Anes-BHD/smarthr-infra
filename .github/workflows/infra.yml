name: SmartHR Infrastructure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: write
  security-events: write

env:
  TF_VERSION: "1.7.0"
  AWS_REGION: "us-east-1"
  # Terraform files are at the repo root — no subdirectory
  WORKING_DIR: "."

jobs:

  # ── 1. Security Scanning ────────────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      # ── Checkov ─────────────────────────────
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
        continue-on-error: true

      # ── Install tfsec ───────────────────────
      - name: Install tfsec
        run: |
          curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash

      # ── Run tfsec ───────────────────────────
      - name: Run tfsec
        run: |
          tfsec . --format sarif --out tfsec-results.sarif || true

      # ── Upload to GitHub Security ───────────
      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: |
          always() &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) &&
          hashFiles('checkov-results.sarif') != ''
        with:
          sarif_file: checkov-results.sarif

      - name: Upload tfsec SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('tfsec-results.sarif') != ''
        with:
          sarif_file: tfsec-results.sarif

      # ── Artifact (optional) ─────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-results
          path: |
            checkov-results.sarif
            tfsec-results.sarif
# ── 2. Terraform Validate & Format ─────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Terraform fmt check
        run: terraform fmt -check -recursive
        # Files are at repo root — no working-directory needed

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

  # ── 3. Terraform Plan ───────────────────────────────────────────────────────
  
  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: [security, validate]
    env:
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_app_key:     ${{ secrets.APP_KEY }}
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
 
      - name: Terraform init
        run: terraform init -input=false
 
      - name: Terraform plan
        id: plan
        run: |
          set +e
          terraform plan \
            -input=false \
            -out=tfplan \
            -detailed-exitcode \
            2>&1 | tee plan-output.txt
          PLAN_EXIT=${PIPESTATUS[0]}
          echo "exitcode=$PLAN_EXIT" >> $GITHUB_OUTPUT
 
          # Exit codes:
          #   0 = success, no changes
          #   1 = error (real terraform failure) → fail the job
          #   2 = success, changes detected → continue normally
          if [ $PLAN_EXIT -eq 1 ]; then
            echo "::error::Terraform plan encountered an error"
            exit 1
          fi
          exit 0
 
      - name: Save plan artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tfplan
          path: |
            tfplan
            plan-output.txt
          retention-days: 5
 
      - name: Comment plan on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan-output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n... (truncated)'
              : plan;
            const exitcode = '${{ steps.plan.outputs.exitcode }}';
            const icon = exitcode === '2' ? '⚠️ Changes detected' : '✅ No changes';
            const body = `## Terraform Plan — ${icon}\n\`\`\`hcl\n${truncated}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
 
  # ── 4. Terraform Apply (main branch only) ─────────────────────────────────────────────────────────────
  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: [plan]
    if: github.event_name == 'workflow_dispatch'
    environment: production
    env:
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_app_key:     ${{ secrets.APP_KEY }}
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
 
      - name: Terraform init
        run: terraform init -input=false
 
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: .
 
      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan
 
      - name: Output ALB DNS
        run: terraform output alb_dns_name
 