name: SmartHR Infrastructure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: write
  security-events: write

env:
  TF_VERSION: "1.7.0"
  AWS_REGION: "us-east-1"
  # Terraform files are at the repo root — no subdirectory
  WORKING_DIR: "."

jobs:

  # ── 1. Security Scanning ────────────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      # ── Checkov ─────────────────────────────
      - name: Run Checkov (SARIF)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          output_format: sarif
          output_file_path: checkov-sarif-output
        continue-on-error: true

      - name: Locate Checkov SARIF
        run: |
          # The action writes results_sarif.sarif inside the output dir
          if [ -f checkov-sarif-output/results_sarif.sarif ]; then
            cp checkov-sarif-output/results_sarif.sarif checkov-results.sarif
          else
            echo "Checkov SARIF not found, creating empty file"
            echo '{}' > checkov-results.sarif
          fi
          ls -la checkov-results.sarif

      - name: Run Checkov (text summary for email)
        run: |
          pip install checkov --quiet
          checkov -d . --framework terraform --compact --quiet > checkov-summary.txt 2>&1 || true

      # ── Install tfsec ───────────────────────
      - name: Install tfsec
        run: |
          curl -sLo tfsec https://github.com/aquasecurity/tfsec/releases/download/v1.28.14/tfsec-linux-amd64
          chmod +x tfsec
          sudo mv tfsec /usr/local/bin/

      # ── Run tfsec (SARIF + text) ────────────
      - name: Run tfsec (SARIF)
        run: tfsec . --format sarif --out tfsec-results.sarif --no-color || true

      - name: Run tfsec (text summary for email)
        run: tfsec . --no-color > tfsec-summary.txt 2>&1 || true

      # ── Artifact upload ─────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-results
          path: |
            checkov-results.sarif
            tfsec-results.sarif
            checkov-summary.txt
            tfsec-summary.txt

      # ── Email security results ──────────────
      - name: Email security scan results
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Security Scan — ${{ github.repository }} (commit ${{ github.sha }})"
          to: benhenda.anes@gmail.com
          from: GitHub Actions <${{ secrets.SMTP_USERNAME }}>
          body: |
            Security scan completed for commit ${{ github.sha }} on ${{ github.ref_name }}.

            Checkov and tfsec results are attached as both human-readable summaries
            (.txt) and SARIF files (.sarif) for tool integration.

            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          attachments: checkov-summary.txt,tfsec-summary.txt,checkov-results.sarif,tfsec-results.sarif


  validate-and-plan:
    name: Validate & Plan
    runs-on: ubuntu-latest
    needs: [security]
    env:
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_app_key:     ${{ secrets.APP_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: |
          set +e
          terraform plan \
            -input=false \
            -out=tfplan \
            -detailed-exitcode \
            -no-color \
            2>&1 | tee plan-output.txt
          PLAN_EXIT=${PIPESTATUS[0]}
          echo "exitcode=$PLAN_EXIT" >> $GITHUB_OUTPUT

          if [ $PLAN_EXIT -eq 1 ]; then
            echo "::error::Terraform plan encountered an error"
            exit 1
          fi
          exit 0

      - name: Save plan artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tfplan
          path: |
            tfplan
            plan-output.txt
          retention-days: 5

      - name: Email plan output
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Terraform Plan — ${{ github.repository }} (${{ steps.plan.outputs.exitcode == '2' && 'Changes detected' || 'No changes' }})"
          to: benhenda.anes@gmail.com
          from: GitHub Actions <${{ secrets.SMTP_USERNAME }}>
          body: |
            Terraform plan completed for commit ${{ github.sha }}.
            Exit code: ${{ steps.plan.outputs.exitcode }} (0 = no changes, 2 = changes detected)

            To approve and apply, go to:
            ${{ github.server_url }}/${{ github.repository }}/actions/workflows/infra.yml

            Then click "Run workflow" on the main branch.

            Plan output is attached.
          attachments: plan-output.txt  

  # ── 4. Terraform Apply (main branch only) ─────────────────────────────────────────────────────────────
  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: [validate-and-plan]
    if: github.event_name == 'workflow_dispatch'
    environment: production
    env:
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_app_key:     ${{ secrets.APP_KEY }}
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
 
      - name: Terraform init
        run: terraform init -input=false
 
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: .
 
      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan
 
      - name: Output ALB DNS
        run: terraform output alb_dns_name
 